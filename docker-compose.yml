services:
  # Create a base template that isn't a "service" itself
  base-app:
    build:
      context: .
      args:
        - PYTHON_VERSION=${PYTHON_VERSION}
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    stdin_open: true
    tty: true

  app:
    extends: base-app
    profiles: ["cpu"]

  app-gpu:
    extends: base-app
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app-mac:
    extends: base-app
    profiles: ["mps"]
    environment:
      - DEVICE=mps
      - PYTORCH_ENABLE_MPS_FALLBACK=1