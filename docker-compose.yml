x-app-template: &app-template
  build:
    context: .
    args:
      - PYTHON_VERSION=${PYTHON_VERSION}
  env_file: .env
  volumes:
    - .venv:/app/.venv
    - ./pyproject.toml:/app/pyproject.toml
    - ./uv.lock:/app/uv.lock
    - ${DATA_VOLUME}:/app/data
    - ./config.yaml:/app/config.yaml
  stdin_open: true
  tty: true
  environment:
    - UV_PROJECT_ENVIRONMENT=/app/.venv
    

services:
  app:
    <<: *app-template
    profiles: ["cpu"]

  app-gpu:
    <<: *app-template
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
  app-mps:
    <<: *app-template
    profiles: ["mps"]
